# Evaluator harness — smoke tier (per-PR).
#
# Runs the `//go:build eval_smoke` suite across the whole module. Budget:
# 30-60s wall time, blocking. See docs/rfc/EVALUATOR_HARNESS.md (issue #37).
#
# The full tier runs in release.yml before a tag is cut; that one can take
# 3-5 minutes. Keep this file lean.

name: Eval smoke

on:
  pull_request:
    paths:
      - 'tests/eval/**'
      - 'cmd/agent-deck/feedback_cmd.go'
      - 'cmd/agent-deck/main.go'
      - 'internal/ui/feedback_dialog*.go'
      - 'internal/ui/home.go'
      - 'internal/ui/preview*.go'
      - 'internal/tmux/**'
      - 'internal/session/instance.go'
      - 'internal/feedback/**'
      - 'internal/session/userconfig.go'
      - '.github/workflows/eval-smoke.yml'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    name: eval_smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # tmux ships in every ubuntu-latest image, but pin a sanity check so
      # a missing binary fails loudly here instead of at Skip() in a test.
      - name: Verify tmux available
        run: |
          which tmux
          tmux -V

      # zoxide is required by the quick-open picker tests introduced in
      # #693 (v1.7.54). It's not on ubuntu-latest by default, so install
      # it here — tests short-circuit on ZoxideAvailable() and otherwise
      # return empty results, masking any real regression with a false
      # FAIL across every PR that triggers eval-smoke.
      - name: Install zoxide
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zoxide
          zoxide --version

      - name: Run eval_smoke suite
        env:
          GOTOOLCHAIN: go1.25.12
        run: |
          go test -tags eval_smoke -race -count=1 -timeout 3m \
            ./tests/eval/... ./internal/ui/...
